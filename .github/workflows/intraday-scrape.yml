name: Intraday Market Data Scrape

on:
  schedule:
    # Every 30 minutes during US market hours (9:30 AM - 4:00 PM ET / 13:30 - 20:00 UTC)
    - cron: '5,35 13-19 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r scraper/requirements.txt

      - name: Run intraday scraper
        env:
          SCRAPINGANT_API_KEY_1: ${{ secrets.SCRAPINGANT_API_KEY_1 }}
          SCRAPINGANT_API_KEY_2: ${{ secrets.SCRAPINGANT_API_KEY_2 }}
        run: |
          cd scraper
          python run_intraday.py

      - name: Commit & push data
        run: |
          git config user.name "Sigma Scraper Bot"
          git config user.email "scraper@sigmacapital.io"
          git add public/data/ .cache/
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "data: intraday scrape $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=sigma-capital
