name: Daily Financial Data Scrape

on:
  schedule:
    # Run at 6:00 AM ET (11:00 UTC) every weekday — pre-market data refresh
    - cron: '0 11 * * 1-5'
    # Run at 10:00 PM ET (2:00 UTC next day) — after-hours data capture
    - cron: '0 2 * * 2-6'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r scraper/requirements.txt

      - name: Run daily scraper
        env:
          SCRAPINGANT_API_KEY_1: ${{ secrets.SCRAPINGANT_API_KEY_1 }}
          SCRAPINGANT_API_KEY_2: ${{ secrets.SCRAPINGANT_API_KEY_2 }}
        run: |
          cd scraper
          python run_daily.py

      - name: Commit & push data to data branch
        run: |
          git config user.name "Sigma Scraper Bot"
          git config user.email "scraper@sigmacapital.io"

          # Check if data branch exists on remote
          git ls-remote --heads origin data || true
          if git ls-remote --heads origin data | grep -q data; then
            git checkout data
          else
            git checkout --orphan data
            git rm -rf . 2>/dev/null || true
          fi

          # Copy data from the scraper run
          # The scraper writes to public/data/ — we sync that to the data branch root
          git checkout main -- public/data/

          # Move public/data/* to root for the data branch (Cloudflare Pages serves from root)
          mkdir -p tmp_data
          cp -r public/data/* tmp_data/ 2>/dev/null || true
          rm -rf public
          cp -r tmp_data/* . 2>/dev/null || true
          rm -rf tmp_data

          git add -A
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "data: daily scrape $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin data --force
          fi
