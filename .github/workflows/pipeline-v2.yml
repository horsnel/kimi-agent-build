name: 🧠 AI Pipeline (Data + Deploy)

# ──────────────────────────────────────────────────────────────────────────────
# Sigma Capital — Data Pipeline + Deploy
#
# Architecture:
#   - This workflow: Scrape data + Build + Deploy to Cloudflare Pages
#   - Pipeline Worker: LLM rewriting (triggered separately via API)
#   - Worker KV: Article storage for fast edge reads
#
# The LLM rewriting runs on the Pipeline Worker (Cloudflare edge),
# which can access Workers AI. GitHub Actions just handles scraping + deploy.
# ──────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 0 * * *'    # Midnight UTC
    - cron: '0 6 * * *'    # 6AM UTC
    - cron: '0 12 * * *'   # 12PM UTC
    - cron: '0 18 * * *'   # 6PM UTC
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'vite.config.ts'
      - 'index.html'
  workflow_dispatch:
    inputs:
      skip_scrape:
        description: 'Skip data scraping (just build + deploy)'
        required: false
        type: boolean
        default: false
      trigger_llm:
        description: 'Trigger LLM rewrite on Worker'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  NODE_ENV: development
  PIPELINE_API_URL: https://sigma-pipeline.odehebuka48.workers.dev

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1: Scrape Data + Build + Deploy
  # ────────────────────────────────────────────────────────────────────────────
  fetch-build-deploy:
    name: "📡 Fetch → 🏗️ Build → 🚀 Deploy"
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: "🟢 Setup Node.js 20"
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: "📦 Install dependencies (including dev)"
        run: npm ci --include=dev

      # ── STEP 1: Fetch real data ──────────────────────────────────────────────
      - name: "📡 Fetch real-time data"
        if: ${{ github.event.inputs.skip_scrape != 'true' }}
        env:
          SERPER_API_KEY_1: ${{ secrets.SERPER_API_KEY_1 }}
          SERPER_API_KEY_2: ${{ secrets.SERPER_API_KEY_2 }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          FREEPIK_API_KEY: ${{ secrets.FREEPIK_API_KEY }}
        run: |
          echo "=== Fetching real data at $(date -u) ==="
          node scripts/fetch-real-data.cjs --type=all || true

      - name: "📊 Data summary"
        if: ${{ github.event.inputs.skip_scrape != 'true' }}
        run: |
          echo "Articles: $(ls public/data/articles/*.json 2>/dev/null | grep -v index.json | wc -l)"
          echo "News: $(node -e "try{console.log(require('./public/data/news.json').length)}catch{console.log(0)}")"

      # ── STEP 2: Sync articles to Worker KV ──────────────────────────────────
      - name: "🔄 Sync articles to Pipeline KV"
        run: |
          echo "=== Syncing articles to Worker KV ==="
          ARTICLES=$(ls public/data/articles/*.json 2>/dev/null | grep -v index.json | wc -l)
          echo "Syncing $ARTICLES articles..."
          
          # Build a JSON array of all articles and push to the Worker API
          node -e "
            const fs = require('fs');
            const path = require('path');
            const dir = 'public/data/articles';
            const files = fs.readdirSync(dir).filter(f => f.endsWith('.json') && f !== 'index.json');
            const articles = files.map(f => JSON.parse(fs.readFileSync(path.join(dir, f), 'utf8'))).filter(a => a.slug);
            
            async function push() {
              const batchSize = 10;
              let synced = 0;
              for (let i = 0; i < articles.length; i += batchSize) {
                const batch = articles.slice(i, i + batchSize);
                const resp = await fetch('${{ env.PIPELINE_API_URL }}/api/articles/bulk', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ articles: batch })
                });
                const data = await resp.json();
                synced += data.synced || 0;
              }
              console.log('Synced ' + synced + ' articles to Worker KV');
            }
            push().catch(e => console.error('Sync failed:', e.message));
          "

      # ── STEP 3: Trigger LLM rewrite on Worker (optional) ───────────────────
      - name: "🧠 Trigger LLM rewrite on Pipeline Worker"
        if: ${{ github.event.inputs.trigger_llm == 'true' || (github.event_name == 'schedule' && github.event.schedule == '0 0 * * *') }}
        run: |
          echo "=== Triggering LLM rewrite on Worker ==="
          curl -s -X POST "${{ env.PIPELINE_API_URL }}/api/pipeline/run" \
            -H "Content-Type: application/json" \
            -d '{"type":"news","maxArticles":5}' || echo "Worker LLM trigger failed (non-blocking)"

      # ── STEP 4: Commit data changes ─────────────────────────────────────────
      - name: "💾 Commit & push data changes"
        run: |
          git config user.name "Sigma Data Bot"
          git config user.email "data-bot@sigmacapital.dev"
          git add public/data/ public/images/articles/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "📡 data: pipeline $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
            echo "✅ Data committed and pushed"
          fi

      # ── STEP 5: Build and Deploy ────────────────────────────────────────────
      - name: "🏗️ Build site"
        run: |
          npm run build
          du -sh dist/

      - name: "🚀 Deploy to Cloudflare Pages"
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=sigma-capital

      - name: "✅ Pipeline summary"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🧠 AI Pipeline Complete!"
          echo "📍 Site: https://sigma-capital.pages.dev"
          echo "📡 KV API: ${{ env.PIPELINE_API_URL }}"
          echo "⏰ $(date -u)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
