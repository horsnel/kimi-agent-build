name: Fetch Real Data & Deploy

# ──────────────────────────────────────────────────────────────────────────────
# Sigma Capital — Automated Data Pipeline + Cloudflare Pages Deployment
#
# This workflow:
#   1. Runs fetch-real-data.cjs to get LIVE data from Serper.dev + Tavily
#   2. Commits updated JSON data files + articles
#   3. Builds the Vite app
#   4. Deploys to Cloudflare Pages via Wrangler CLI
#
# Schedule (UTC):
#   - 06:00  → Pre-market morning refresh
#   - 12:00  → Midday update (lunch-time data)
#   - 18:00  → After-market close update
#   - 00:00  → Midnight full refresh
# ──────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # 4x daily: 6AM, 12PM, 6PM, 12AM UTC
    - cron: '0 6 * * *'
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      fetch_type:
        description: 'Type of data to fetch (all, news, market)'
        required: false
        default: 'all'
      skip_deploy:
        description: 'Skip Cloudflare deployment (only fetch & commit)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  NODE_ENV: production

jobs:
  fetch-data:
    name: 📡 Fetch Real Data
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📡 Fetch real-time data (news + market)
        env:
          SERPER_API_KEY_1: ${{ secrets.SERPER_API_KEY_1 }}
          SERPER_API_KEY_2: ${{ secrets.SERPER_API_KEY_2 }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          echo "=== Fetching real data at $(date -u) ==="
          node scripts/fetch-real-data.cjs --type=${{ github.event.inputs.fetch_type || 'all' }}

      - name: 📊 Data summary
        run: |
          echo "=== Data Files Summary ==="
          echo "📰 News articles: $(node -e "try{console.log(require('./public/data/news.json').length)}catch{console.log(0)}")"
          echo "📄 Article files: $(ls public/data/articles/*.json 2>/dev/null | grep -v index.json | wc -l)"
          echo "📈 Indices: $(node -e "try{console.log(require('./public/data/indices.json').length)}catch{console.log(0)}")"
          echo "₿  Crypto assets: $(node -e "try{console.log(require('./public/data/crypto.json').length)}catch{console.log(0)}")"
          echo "😱 Fear & Greed: $(node -e "try{console.log(require('./public/data/fear_greed.json').currentValue)}catch{console.log('N/A')}")"
          echo "📊 Yield curve points: $(node -e "try{console.log(require('./public/data/yield_curve.json').length)}catch{console.log(0)}")"
          echo "📅 Manifest: $(node -e "try{console.log(require('./public/data/manifest.json').lastUpdated)}catch{console.log('N/A')}")"

      - name: 💾 Commit & push data changes
        id: commit
        run: |
          git config user.name "Sigma Data Bot"
          git config user.email "data-bot@sigmacapital.dev"
          git add public/data/ public/images/articles/
          if git diff --staged --quiet; then
            echo "No data changes to commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "📡 data: real-time fetch $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ Data committed and pushed"
          fi

      - name: 📤 Upload data artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-data
          path: |
            public/data/
            public/images/articles/
          retention-days: 1

  build-and-deploy:
    name: 🚀 Build & Deploy to Cloudflare
    needs: fetch-data
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event.inputs.skip_deploy != 'true' }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📥 Download data artifact
        uses: actions/download-artifact@v4
        with:
          name: site-data
          path: public/

      - name: 🏗️ Build site
        run: npm run build

      - name: 🚀 Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=sigma-capital

      - name: ✅ Deployment summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🚀 Sigma Capital deployed successfully!"
          echo "📍 URL: https://sigma-capital.pages.dev"
          echo "⏰ Deployed at: $(date -u)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ────────────────────────────────────────────────────────────────────────────
  # Optional: Also generate SEO articles after data fetch
  # Runs the article generator with Tavily for richer content
  # ────────────────────────────────────────────────────────────────────────────
  generate-seo-articles:
    name: 📰 Generate SEO Articles
    needs: fetch-data
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only generate SEO articles on the midnight and 6AM runs (not every 6 hours)
    if: ${{ github.event_name == 'schedule' && (github.event.schedule == '0 0 * * *' || github.event.schedule == '0 6 * * *') }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📥 Download data artifact
        uses: actions/download-artifact@v4
        with:
          name: site-data
          path: public/

      - name: 📰 Generate SEO articles
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SERPI_API_KEY: ${{ secrets.SERPER_API_KEY_1 }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: |
          echo "=== Generating SEO articles ==="
          node scripts/generate-articles/index.js --type=market-wrap || true
          node scripts/generate-articles/index.js --type=sector || true
          node scripts/generate-articles/index.js --type=how-to || true
          node scripts/generate-articles/index.js --type=index || true

      - name: 💾 Commit & push articles
        run: |
          git config user.name "Sigma Article Bot"
          git config user.email "article-bot@sigmacapital.dev"
          git add public/data/articles/ public/images/articles/
          if git diff --staged --quiet; then
            echo "No article changes to commit"
          else
            git commit -m "📰 articles: SEO generation $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
            echo "✅ Articles committed and pushed"
          fi

  # Final deploy after SEO articles are generated
  final-deploy:
    name: 🚀 Final Deploy (with articles)
    needs: generate-seo-articles
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ always() && needs.generate-seo-articles.result == 'success' }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build site
        run: npm run build

      - name: 🚀 Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=sigma-capital
