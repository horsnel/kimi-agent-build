name: Deploy to Cloudflare Pages

# ──────────────────────────────────────────────────────────────────────────────
# Deploy on push to main — builds and deploys the current state of the repo
# This handles code changes; data changes are handled by fetch-and-deploy.yml
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'vite.config.ts'
      - 'tailwind.config.js'
      - 'postcss.config.js'
      - 'index.html'
  workflow_dispatch:

jobs:
  deploy:
    name: "\U0001F680 Build & Deploy"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: "\U0001F4E5 Checkout"
        uses: actions/checkout@v4

      - name: "\U0001F7E2 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: "\U0001F4E6 Install dependencies"
        run: npm ci

      - name: "\U0001F3D7 Build"
        run: npm run build

      - name: "\U0001F680 Deploy to Cloudflare Pages"
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=sigma-capital

      - name: "\u2705 Deploy summary"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🚀 Deployed to https://sigma-capital.pages.dev"
          echo "⏰ $(date -u)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
