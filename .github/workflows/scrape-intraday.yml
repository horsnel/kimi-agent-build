name: Scrape Intraday Data
on:
  schedule:
    - cron: '*/15 13-21 * * 1-5'  # Every 15 min, 9AM-5PM ET (13:00-21:00 UTC)
  workflow_dispatch:  # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt
      - name: Install dependencies
        run: pip install -r scraper/requirements.txt
      - name: Run intraday scraper
        run: python scraper/run_intraday.py
        env:
          PYTHONPATH: scraper
      - name: Commit data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/
          git diff --staged --quiet || git commit -m "📊 intraday data update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
