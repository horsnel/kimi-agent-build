name: Generate SEO Articles

on:
  schedule:
    # Run daily at 6:00 AM UTC
    - cron: '0 6 * * *'
    # Also run at 18:00 UTC for evening content
    - cron: '0 18 * * *'
    # Weekly deep-dive on Sundays at 8:00 AM UTC
    - cron: '0 8 * * 0'
  workflow_dispatch:
    inputs:
      article_type:
        description: 'Type of article to generate (all, market-wrap, sector, how-to, glossary, listicle, comparison, earnings, economic)'
        required: false
        default: 'all'
      force:
        description: 'Force regeneration even if articles exist'
        required: false
        default: 'false'

env:
  NODE_ENV: production

jobs:
  generate-articles:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install article generator dependencies
        run: |
          cd scripts/generate-articles
          if [ -f package.json ]; then npm ci; fi

      - name: Generate Market Wrap Articles
        if: ${{ github.event.inputs.article_type == 'all' || github.event.inputs.article_type == 'market-wrap' || github.event_name == 'schedule' }}
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SERPI_API_KEY: ${{ secrets.SERPI_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: node scripts/generate-articles/index.js --type=market-wrap

      - name: Generate Sector Analysis Articles
        if: ${{ github.event.inputs.article_type == 'all' || github.event.inputs.article_type == 'sector' || github.event_name == 'schedule' }}
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SERPI_API_KEY: ${{ secrets.SERPI_API_KEY }}
        run: node scripts/generate-articles/index.js --type=sector

      - name: Generate How-To & Guide Articles
        if: ${{ github.event.inputs.article_type == 'all' || github.event.inputs.article_type == 'how-to' || github.event_name == 'schedule' }}
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SERPI_API_KEY: ${{ secrets.SERPI_API_KEY }}
        run: node scripts/generate-articles/index.js --type=how-to

      - name: Generate Glossary Articles
        if: ${{ github.event.inputs.article_type == 'all' || github.event.inputs.article_type == 'glossary' || github.event_name == 'schedule' }}
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SERPI_API_KEY: ${{ secrets.SERPI_API_KEY }}
        run: node scripts/generate-articles/index.js --type=glossary

      - name: Generate Listicle Articles
        if: ${{ github.event.inputs.article_type == 'all' || github.event.inputs.article_type == 'listicle' || github.event_name == 'schedule' }}
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SERPI_API_KEY: ${{ secrets.SERPI_API_KEY }}
        run: node scripts/generate-articles/index.js --type=listicle

      - name: Generate Comparison Articles
        if: ${{ github.event.inputs.article_type == 'all' || github.event.inputs.article_type == 'comparison' || github.event_name == 'schedule' }}
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SERPI_API_KEY: ${{ secrets.SERPI_API_KEY }}
        run: node scripts/generate-articles/index.js --type=comparison

      - name: Generate Earnings Recap Articles
        if: ${{ github.event.inputs.article_type == 'all' || github.event.inputs.article_type == 'earnings' || github.event_name == 'schedule' }}
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SERPI_API_KEY: ${{ secrets.SERPI_API_KEY }}
        run: node scripts/generate-articles/index.js --type=earnings

      - name: Generate Economic Calendar Articles
        if: ${{ github.event.inputs.article_type == 'all' || github.event.inputs.article_type == 'economic' || github.event_name == 'schedule' }}
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SERPI_API_KEY: ${{ secrets.SERPI_API_KEY }}
        run: node scripts/generate-articles/index.js --type=economic

      - name: Build article index
        run: node scripts/generate-articles/index.js --type=index

      - name: Commit and push generated articles
        run: |
          git config --local user.email "article-bot@sigmacapital.dev"
          git config --local user.name "Sigma Article Bot"
          git add public/data/articles/ public/images/articles/
          git diff --staged --quiet || git commit -m "📰 auto: generate SEO articles $(date +%Y-%m-%d)"
          git push

      - name: Trigger Cloudflare deployment
        if: success()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            npx wrangler pages deploy dist --project-name=sigma-capital
          else
            echo "No Cloudflare API token — skipping direct deploy (GitHub-connected deploy will trigger)"
          fi
